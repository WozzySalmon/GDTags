name: Windows Native Build

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  GODOT_CPP_REF: godot-4.5-stable
  GODOT_46_VERSION: 4.6.3
  GODOT_47_VERSION: '4.7'

jobs:
  windows-native:
    name: Build, test, and package Windows GDExtension
    runs-on: windows-latest
    timeout-minutes: 75

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install SCons
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install scons
          python -m SCons --version

      - name: Clone godot-cpp compatibility baseline
        shell: pwsh
        run: |
          git clone --depth 1 --branch $env:GODOT_CPP_REF https://github.com/godotengine/godot-cpp.git godot-cpp
          git -C godot-cpp submodule update --init --recursive
          Write-Host "godot-cpp ref: $env:GODOT_CPP_REF"
          git -C godot-cpp rev-parse HEAD

      - name: Download Godot test executables
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path godot | Out-Null

          $downloads = @(
            @{
              Name = "Godot 4.6.3"
              Url = "https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_win64.exe.zip"
              Dir = "godot/4.6.3"
              Exe = "Godot_v4.6.3-stable_win64.exe"
              EnvName = "GODOT_46_BIN"
            },
            @{
              Name = "Godot 4.7"
              Url = "https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_win64.exe.zip"
              Dir = "godot/4.7"
              Exe = "Godot_v4.7-stable_win64.exe"
              EnvName = "GODOT_47_BIN"
            }
          )

          foreach ($item in $downloads) {
            New-Item -ItemType Directory -Force -Path $item.Dir | Out-Null
            $zip = Join-Path $item.Dir "godot.zip"
            Write-Host "Downloading $($item.Name)..."
            Invoke-WebRequest -Uri $item.Url -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath $item.Dir -Force
            $exePath = Resolve-Path (Join-Path $item.Dir $item.Exe)
            Write-Host "$($item.Name): $exePath"
            "$($item.EnvName)=$($exePath.Path)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Build Windows debug DLL
        shell: cmd
        run: tools\windows\build_native.cmd

      - name: Smoke test with Godot 4.6.3
        shell: pwsh
        run: |
          $env:GODOT_BIN = $env:GODOT_46_BIN
          cmd /c tools\windows\test_native.cmd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Smoke test with Godot 4.7
        shell: pwsh
        run: |
          $env:GODOT_BIN = $env:GODOT_47_BIN
          cmd /c tools\windows\test_native.cmd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Windows release DLL
        shell: cmd
        run: tools\windows\build_native_release.cmd

      - name: Package addon zips
        shell: pwsh
        run: |
          cmd /c tools\windows\package_addon.cmd -SkipBuild
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          cmd /c tools\windows\package_addon.cmd -Variant gdscript -SkipBuild
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Get-ChildItem dist -Recurse | Format-Table FullName, Length

      - name: Upload addon packages
        uses: actions/upload-artifact@v4
        with:
          name: gameplay-tags-windows-packages
          path: dist/*.zip
          if-no-files-found: error
